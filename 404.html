<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Tatva by Tradeprop</title>
    <link rel="stylesheet" href="css/styles.min.css">
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #fffdf0;
            padding: 2rem;
        }
        .error-content {
            max-width: 600px;
        }
        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 900;
            color: #d4af37;
            line-height: 1;
            margin-bottom: 1rem;
            opacity: 0.2;
        }
        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
        }
        .error-text {
            font-family: 'Montserrat', sans-serif;
            color: #666;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .back-home {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: #d4af37;
            color: white;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .back-home:hover {
            background: #b8962d;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">LOST IN LUXURY</h1>
            <p class="error-text">The masterpiece you are looking for has been moved or doesn't exist. Allow us to guide you back to our curated collection of premium properties.</p>
            <a href="/" class="back-home">RETURN TO HOME</a>
        </div>
    </div>
</body>
</html>
