    <style>
        .thank-you-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #fffdf0; /* Maintaining the light cream theme */
            padding: 20px;
        }
        .thank-you-content {
            max-width: 600px;
            padding: 60px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid #d4af37;
        }
        .thank-you-icon {
            font-size: 80px;
            color: #d4af37;
            margin-bottom: 30px;
        }
        .thank-you-title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: #1a1a1a;
            margin-bottom: 20px;
        }
        .thank-you-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .back-home {
            display: inline-block;
            padding: 15px 40px;
            background: #d4af37;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }
        .back-home:hover {
            background: #b8962d;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
