<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8544265950892925"
        crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatva by Tradeprop - Gallery</title>

    <!-- Tab / Title bar icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./images/logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./images/logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./images/logo.png">
    <meta name="theme-color" content="#000000">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="golden-logo">
                <div class="logo-icon"><img src="./images/logo.png" alt="Tatva Logo" class="logo-img"></div>
            </div>
            <div class="loading-text">TATVA</div>
            <div class="loading-subtitle">BY TRADEPROP</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>


    <!-- Premium Navigation -->
    <div data-include="partials/nav.html"></div>


    <!-- Immersive Gallery -->
    <section id="gallery" class="immersive-gallery">
        <div class="container">
            <div class="section-intro" data-aos="fade-up">
                <div class="intro-badge">VISUAL JOURNEY</div>
                <h2 class="section-title text-reveal">
                    <span class="golden-text typography-hover">Experience Tatva</span>
                </h2>
                <p class="section-subtitle text-fade-in lead">
                    Immerse yourself in the breathtaking beauty of our luxury properties.
                    Every image tells a story of elegance, comfort, and unparalleled living.
                </p>
            </div>

            <div data-module="gallery"></div>

            <div class="visual-hub" data-aos="fade-up" data-aos-delay="250">
                <div class="video-core">
                    <div class="video-frame">
                        <iframe src="https://www.youtube.com/embed/kGqMKevZbJc?rel=0&modestbranding=1&playsinline=1"
                            title="Tatva Club & Resorts - Luxury Living Experience" frameborder="0"
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                            loading="lazy" allowfullscreen>
                        </iframe>
                    </div>
                </div>
            </div>
        </div>

    </section>
    <!-- Luxury Footer -->
    <div data-include="partials/footer.html"></div>



    <!-- Scripts -->    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/includes.js"></script>
    <script src="js/modules.js"></script>
    <script src="js/script.js"></script>
    <script src="js/bootstrap.js"></script>
    <script type="module">
        import('https://cdn.jsdelivr.net/npm/@vercel/analytics/dist/index.mjs')
            .then(({ inject }) => inject({ mode: 'auto' }))
            .catch(() => { /* analytics optional */ });
    </script>
</body>

</html>
